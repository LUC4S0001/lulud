<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appel P2P Privé - Multi-Fenêtres</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c2f33;
            color: white;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .connection-panel {
            background-color: #23272a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .id-container {
            display: flex;
            align-items: center;
            background: #2c2f33;
            padding: 5px 10px;
            border-radius: 5px;
        }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #7289da;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #5b6eae; }
        button.active { background-color: #ed4245; }
        
        #copy-btn {
            padding: 5px 10px;
            margin-left: 10px;
            font-size: 0.9em;
            background-color: #4f545c;
        }
        #copy-btn:hover { background-color: #72767d; }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .video-container.zoomed {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 90vh;
            z-index: 1000;
            aspect-ratio: auto;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
        body.has-zoom .overlay { display: block; }
    </style>
</head>
<body>

<div class="overlay" onclick="closeAllZooms()"></div>

<div class="connection-panel">
    <div class="id-container">
        <span>ID : <strong id="my-id">...</strong></span>
        <button id="copy-btn">📋 Copier</button>
    </div>
    <input type="text" id="target-id" placeholder="ID du partenaire">
    <button id="connect-btn">Appeler</button>
    <button id="btn-cam">Caméra Off</button>
    <button id="btn-mic">Micro Off</button>
    <button id="btn-deafen">Sourdine Off</button>
    <button id="btn-screen">Partager Écran</button>
</div>

<div id="video-grid">
    </div>

<script>
    const peer = new Peer();
    const videoGrid = document.getElementById('video-grid');
    let localStream;
    let targetIdStore = "";
    
    let localScreenStream = null;
    let screenCall = null;

    // 1. Initialisation caméra/micro
    async function init() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            addVideoStream(localStream, "Moi (Caméra)", true);
        } catch (e) { console.error("Accès refusé", e); }
    }

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // Fonction Copier l'ID
    document.getElementById('copy-btn').onclick = () => {
        const idText = document.getElementById('my-id').innerText;
        if (idText !== "...") {
            navigator.clipboard.writeText(idText).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = "✅ Copié !";
                btn.style.backgroundColor = "#43b581"; // Vert pour le succès
                setTimeout(() => {
                    btn.innerText = "📋 Copier";
                    btn.style.backgroundColor = "#4f545c"; // Retour à la couleur initiale
                }, 2000);
            }).catch(err => console.error("Erreur de copie", err));
        }
    };

    // 2. Recevoir un appel
    peer.on('call', call => {
        if (call.metadata?.type !== 'screen') {
            targetIdStore = call.peer;
            document.getElementById('target-id').value = targetIdStore; 
        }

        call.answer(call.metadata?.type === 'screen' ? null : localStream);
        
        call.on('stream', remoteStream => {
            const label = call.metadata?.type === 'screen' ? "Écran Partagé" : "Partenaire";
            addVideoStream(remoteStream, label, false, call);
        });
    });

    // 3. Appeler
    document.getElementById('connect-btn').onclick = () => {
        targetIdStore = document.getElementById('target-id').value;
        if (!targetIdStore) return alert("Entrez un ID partenaire.");
        
        const call = peer.call(targetIdStore, localStream, { metadata: { type: 'camera' } });
        call.on('stream', stream => addVideoStream(stream, "Partenaire", false, call));
    };

    // 4. Ajouter une vidéo à l'interface
    function addVideoStream(stream, label, isMuted, callObj = null) {
        const id = stream.id;
        if (document.getElementById(id)) return;

        const container = document.createElement('div');
        container.className = 'video-container';
        container.id = id;
        
        const video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        if (isMuted) video.muted = true;

        const divLabel = document.createElement('div');
        divLabel.className = 'video-label';
        divLabel.innerText = label;

        container.append(video, divLabel);
        
        // Gestion du ZOOM
        container.onclick = () => {
            const wasZoomed = container.classList.contains('zoomed');
            closeAllZooms();
            if (!wasZoomed) {
                container.classList.add('zoomed');
                document.body.classList.add('has-zoom');
            }
        };

        videoGrid.append(container);

        // --- SYSTÈME DE NETTOYAGE ---
        const removeContainer = () => {
            if (document.getElementById(id)) {
                container.remove();
                closeAllZooms();
            }
        };

        stream.getVideoTracks()[0].addEventListener('ended', () => {
            removeContainer();
            if (callObj) callObj.close();
        });

        if (callObj) {
            callObj.on('close', removeContainer);
            callObj.peerConnection.addEventListener('iceconnectionstatechange', () => {
                if (['disconnected', 'failed', 'closed'].includes(callObj.peerConnection.iceConnectionState)) {
                    removeContainer();
                }
            });
        }
    }

    function closeAllZooms() {
        document.querySelectorAll('.video-container').forEach(c => c.classList.remove('zoomed'));
        document.body.classList.remove('has-zoom');
    }

    // Fonction globale pour arrêter le partage d'écran
    function stopScreenShare() {
        if (localScreenStream) {
            localScreenStream.getTracks().forEach(track => track.stop());
            localScreenStream = null;
        }
        if (screenCall) {
            screenCall.close();
            screenCall = null;
        }
        
        const btnScreen = document.getElementById('btn-screen');
        btnScreen.innerText = "Partager Écran";
        btnScreen.classList.remove('active');
    }

    // --- CONTRÔLES ---
    document.getElementById('btn-cam').onclick = (e) => {
        const v = localStream.getVideoTracks()[0];
        v.enabled = !v.enabled;
        e.target.innerText = v.enabled ? "Caméra Off" : "Caméra On";
        e.target.classList.toggle('active');
    };

    document.getElementById('btn-mic').onclick = (e) => {
        const a = localStream.getAudioTracks()[0];
        a.enabled = !a.enabled;
        e.target.innerText = a.enabled ? "Micro Off" : "Micro On";
        e.target.classList.toggle('active');
    };

    document.getElementById('btn-deafen').onclick = (e) => {
        document.querySelectorAll('video').forEach(v => { 
            if (v.srcObject !== localStream && v.srcObject !== localScreenStream) v.muted = !v.muted; 
        });
        e.target.innerText = e.target.innerText.includes("Off") ? "Sourdine On" : "Sourdine Off";
        e.target.classList.toggle('active');
    };

    // Partage d'écran
    const btnScreen = document.getElementById('btn-screen');
    btnScreen.onclick = async () => {
        if (!targetIdStore) {
            return alert("Vous devez d'abord être en appel avec quelqu'un pour partager l'écran.");
        }

        if (localScreenStream) {
            stopScreenShare();
            return;
        }

        try {
            localScreenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            screenCall = peer.call(targetIdStore, localScreenStream, { metadata: { type: 'screen' } });
            addVideoStream(localScreenStream, "Mon Écran", true, screenCall);

            btnScreen.innerText = "Arrêter l'écran";
            btnScreen.classList.add('active');

            localScreenStream.getVideoTracks()[0].addEventListener('ended', stopScreenShare);
        } catch (err) { 
            console.log("Partage annulé par l'utilisateur."); 
        }
    };

    init();
</script>
</body>
</html>
