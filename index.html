<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appel P2P Privé</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c2f33;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        .connection-panel {
            background-color: #23272a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #7289da;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.2s;
        }
        button:hover {
            background-color: #5b6eae;
        }
        button.active {
            background-color: #ed4245; /* Rouge pour indiquer l'arrêt/coupure */
        }
        .videos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        video {
            background-color: #000;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .controls {
            background-color: #23272a;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Appel Vidéo Sécurisé (P2P)</h2>

    <div class="connection-panel">
        <p>Ton identifiant à partager : <strong id="my-id">Génération...</strong></p>
        <input type="text" id="target-id" placeholder="Identifiant de ta copine">
        <button id="connect-btn">Appeler</button>
    </div>

    <div class="videos">
        <div>
            <h3>Toi</h3>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div>
            <h3>Ta copine</h3>
            <video id="remote-video" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="btn-cam">Désactiver Caméra</button>
        <button id="btn-mic">Désactiver Micro</button>
        <button id="btn-deafen">Activer Sourdine</button>
        <button id="btn-screen">Partager l'écran</button>
    </div>
</div>

<script>
    // Variables globales
    let peer = new Peer(); // Initialisation de PeerJS
    let localStream;
    let currentCall;
    let isScreenSharing = false;

    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');

    // 1. Récupération de l'identifiant unique
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
    });

    // 2. Démarrer la caméra et le micro
    async function startMedia() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
        } catch (err) {
            alert("Erreur d'accès à la caméra/micro. Vérifie les permissions.");
            console.error(err);
        }
    }

    // Lancer les médias au chargement
    startMedia();

    // 3. Répondre à un appel entrant
    peer.on('call', call => {
        call.answer(localStream); // Répondre avec son propre flux
        setupCallEvent(call);
    });

    // 4. Lancer un appel
    document.getElementById('connect-btn').onclick = () => {
        const targetId = document.getElementById('target-id').value;
        if (!targetId) return alert("Veuillez entrer un identifiant.");
        
        const call = peer.call(targetId, localStream);
        setupCallEvent(call);
    };

    // Gestion de l'appel
    function setupCallEvent(call) {
        currentCall = call;
        call.on('stream', remoteStream => {
            remoteVideo.srcObject = remoteStream;
        });
    }

    // --- CONTRÔLES ---

    // Bouton Caméra
    const btnCam = document.getElementById('btn-cam');
    btnCam.onclick = () => {
        const videoTrack = localStream.getVideoTracks()[0];
        videoTrack.enabled = !videoTrack.enabled;
        btnCam.innerText = videoTrack.enabled ? "Désactiver Caméra" : "Activer Caméra";
        btnCam.classList.toggle('active');
    };

    // Bouton Micro
    const btnMic = document.getElementById('btn-mic');
    btnMic.onclick = () => {
        const audioTrack = localStream.getAudioTracks()[0];
        audioTrack.enabled = !audioTrack.enabled;
        btnMic.innerText = audioTrack.enabled ? "Désactiver Micro" : "Activer Micro";
        btnMic.classList.toggle('active');
    };

    // Bouton Sourdine (Couper le son entrant)
    const btnDeafen = document.getElementById('btn-deafen');
    btnDeafen.onclick = () => {
        remoteVideo.muted = !remoteVideo.muted;
        btnDeafen.innerText = remoteVideo.muted ? "Désactiver Sourdine" : "Activer Sourdine";
        btnDeafen.classList.toggle('active');
    };

    // Bouton Partage d'écran
    const btnScreen = document.getElementById('btn-screen');
    btnScreen.onclick = async () => {
        if (!isScreenSharing) {
            try {
                // Demander le flux de l'écran (le navigateur affichera la fenêtre de choix)
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const screenTrack = screenStream.getVideoTracks()[0];

                // Remplacer la piste vidéo dans l'appel en cours
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(screenTrack);
                }

                // Afficher son propre écran dans sa case locale
                localVideo.srcObject = screenStream;
                isScreenSharing = true;
                btnScreen.innerText = "Arrêter le partage";
                btnScreen.classList.add('active');

                // Si l'utilisateur arrête le partage via le bouton natif du navigateur
                screenTrack.onended = stopScreenShare;

            } catch (err) {
                console.error("Partage d'écran annulé", err);
            }
        } else {
            stopScreenShare();
        }
    };

    function stopScreenShare() {
        const videoTrack = localStream.getVideoTracks()[0];
        
        // Remettre la caméra dans l'appel en cours
        if (currentCall) {
            const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(videoTrack);
        }

        // Remettre la caméra dans sa case locale
        localVideo.srcObject = localStream;
        isScreenSharing = false;
        btnScreen.innerText = "Partager l'écran";
        btnScreen.classList.remove('active');
    }
</script>

</body>
</html>
